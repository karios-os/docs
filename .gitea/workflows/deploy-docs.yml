name: Build Sphinx Documentation

on:
  push:
    branches: [ main, develop, test ]
  pull_request:
    branches: [ main ]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    container: 
      image: python:3.11
      options: --user root
    
    steps:
    - name: Install Node.js and system dependencies
      run: |
        apt-get update && apt-get install -y \
          curl \
          make \
          git \
          libenchant-2-2 \
          libenchant-2-dev \
          && curl -fsSL https://deb.nodesource.com/setup_18.x | bash - \
          && apt-get install -y nodejs \
          && rm -rf /var/lib/apt/lists/*

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: /root/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build documentation
      run: |
        cd docs
        make html
        echo "✅ Sphinx documentation build completed successfully!"

    - name: List built documentation
      run: |
        echo "📁 Documentation built successfully!"
        ls -la docs/_build/html/
        echo "📊 Total files: $(find docs/_build/html/ -type f | wc -l)"
        echo "📏 Total size: $(du -sh docs/_build/html/)"

    - name: Verify key files exist
      run: |
        if [ -f "docs/_build/html/index.html" ]; then
          echo "✅ index.html found"
        else
          echo "❌ index.html missing"
          exit 1
        fi
        
        echo "📋 Main HTML files:"
        find docs/_build/html/ -name "*.html" | head -10